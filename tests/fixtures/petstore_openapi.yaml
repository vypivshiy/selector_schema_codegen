openapi: "3.0.0"
info:
  title: Pet Clinic API
  version: "1.0"
servers:
  - url: https://api.pet-clinic.example.com/v2
paths:
  /pet:
    get:
      summary: List pets with optional pagination
      operationId: listPets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetList"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: Add a new pet
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /pet/{petId}:
    get:
      summary: Get pet by id
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      summary: Update an existing pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      summary: Delete a pet by id
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name
    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
    Pet:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        photoUrls:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        status:
          type: string
      required:
        - name
        - photoUrls
    PetList:
      type: object
      properties:
        pets:
          type: array
          items:
            $ref: "#/components/schemas/Pet"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - pets
        - total
    NewPet:
      type: object
      properties:
        name:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        status:
          type: string
      required:
        - name
    ApiError:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required:
        - code
        - message
