name: Build tree-sitter-kdl

on:
  push:
    paths:
      - 'vendor/tree-sitter-kdl/**'
      - 'scripts/build_kdl.py'
      - '.github/workflows/build-kdl.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            lib: kdl.dll
            build: |
              call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
              if not exist "build\temp" mkdir "build\temp"
              cl.exe /LD /O2 /nologo ^
                /I"vendor\tree-sitter-kdl\src" ^
                vendor\tree-sitter-kdl\src\parser.c ^
                vendor\tree-sitter-kdl\src\scanner.c ^
                /Fe"kdl.dll" ^
                /Fo"build\temp\" ^
                /link /DLL /NODEFAULTLIB:python
            shell: cmd

          - os: ubuntu-latest
            lib: kdl.so
            build: |
              gcc -shared -fPIC -O2 \
                -I vendor/tree-sitter-kdl/src \
                vendor/tree-sitter-kdl/src/parser.c \
                vendor/tree-sitter-kdl/src/scanner.c \
                -o kdl.so
            shell: bash

          - os: macos-13
            lib: kdl-x86_64.dylib
            build: |
              gcc -shared -fPIC -O2 -arch x86_64 \
                -I vendor/tree-sitter-kdl/src \
                vendor/tree-sitter-kdl/src/parser.c \
                vendor/tree-sitter-kdl/src/scanner.c \
                -o kdl-x86_64.dylib
            shell: bash

          - os: macos-latest
            lib: kdl-arm64.dylib
            build: |
              gcc -shared -fPIC -O2 -arch arm64 \
                -I vendor/tree-sitter-kdl/src \
                vendor/tree-sitter-kdl/src/parser.c \
                vendor/tree-sitter-kdl/src/scanner.c \
                -o kdl-arm64.dylib
            shell: bash

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build shared library
        run: ${{ matrix.build }}
        shell: ${{ matrix.shell }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lib }}
          path: ${{ matrix.lib }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get submodule commit
        id: meta
        run: |
          sha=$(git -C vendor/tree-sitter-kdl rev-parse --short HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tag=kdl-$sha" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "tree-sitter-kdl (${{ steps.meta.outputs.sha }})"
          body: |
            Pre-built tree-sitter-kdl shared libraries (KDL 2.0).

            Source: [Tam1SH/tree-sitter-kdl](https://github.com/Tam1SH/tree-sitter-kdl) @ `${{ steps.meta.outputs.sha }}`

            ### Install

            Download the file for your platform, rename to `kdl.dll` / `kdl.so` / `kdl.dylib`,
            and place into `ssc_codegen/kdl/linter/`.

            | File | Platform |
            |------|----------|
            | `kdl.dll` | Windows x64 |
            | `kdl.so` | Linux x64 |
            | `kdl-arm64.dylib` | macOS Apple Silicon |
            | `kdl-x86_64.dylib` | macOS Intel |
          files: |
            dist/kdl.dll
            dist/kdl.so
            dist/kdl-arm64.dylib
            dist/kdl-x86_64.dylib
