name: Build & Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    branches: [main]

permissions:
  contents: read

jobs:
  build_wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cibw_build: "cp310-manylinux* cp311-manylinux* cp312-manylinux* cp313-manylinux*"
          # - os: macos-13
          #   cibw_build: "cp310-macosx* cp311-macosx* cp312-macosx* cp313-macosx*"
          # - os: macos-latest
          #   cibw_build: "cp310-macosx* cp311-macosx* cp312-macosx* cp313-macosx*"
          - os: windows-latest
            cibw_build: "cp310-win* cp311-win* cp312-win* cp313-win*"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_BUILD_FRONTEND: "build[uv]"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publisher

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
